name: Offline Eval Nightly Regression

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:

jobs:
  full_regression:
    name: Full offline regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full offline regression
        run: |
          mkdir -p artifacts/offline_eval
          python evals/ci/offline_eval_ci.py run --mode full --output artifacts/offline_eval/nightly_full_run.json

      - name: Build nightly markdown report
        run: |
          python evals/reports/build_report.py \
            --candidate artifacts/offline_eval/nightly_full_run.json \
            --output artifacts/offline_eval/nightly_full_report.md

      - name: Upload nightly regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offline-eval-nightly-report
          path: |
            artifacts/offline_eval/nightly_full_run.json
            artifacts/offline_eval/nightly_full_report.md

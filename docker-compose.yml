services:
  postgres:
    image: postgres:16
    container_name: agentic_rag_postgres
    environment:
      POSTGRES_DB: agentic_rag
      POSTGRES_USER: agentic_rag
      POSTGRES_PASSWORD: agentic_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_rag -d agentic_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: agentic_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_rag_app
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql+psycopg://agentic_rag:agentic_rag@postgres:5432/agentic_rag
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: legal_chunks
      DOCUMENT_STORAGE_PATH: /app/data/documents
    volumes:
      - documents_data:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8501/_stcore/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  documents_data:
